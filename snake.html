<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
  }
  h1 { margin-bottom: 8px; font-size: 28px; color: #0f0; text-shadow: 0 0 10px #0f0; }
  #info { margin-bottom: 12px; font-size: 18px; }
  #info span { color: #0f0; font-weight: bold; }
  canvas {
    border: 2px solid #0f0;
    border-radius: 4px;
    box-shadow: 0 0 20px rgba(0, 255, 0, 0.15);
    background: #0d0d1a;
  }
  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  #overlay.active { pointer-events: auto; }
  #overlay .msg {
    font-size: 32px;
    font-weight: bold;
    color: #0f0;
    text-shadow: 0 0 15px #0f0;
    margin-bottom: 12px;
  }
  #overlay .sub {
    font-size: 18px;
    color: #aaa;
  }
  button {
    margin-top: 16px;
    padding: 10px 28px;
    font-size: 16px;
    border: 2px solid #0f0;
    background: transparent;
    color: #0f0;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: rgba(0,255,0,0.15); }
</style>
</head>
<body>
<h1>SNAKE</h1>
<div id="info">Score: <span id="score">0</span> &nbsp;|&nbsp; Best: <span id="best">0</span></div>
<div style="position:relative">
  <canvas id="game" width="400" height="400"></canvas>
  <div id="overlay" class="active">
    <div class="msg">SNAKE</div>
    <div class="sub">Use arrow keys or WASD to move</div>
    <button id="startBtn">Start Game</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const startBtn = document.getElementById('startBtn');

const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;
const TICK_MS = 100;

let snake, dir, nextDir, food, score, best = 0, running, timer;

function init() {
  snake = [{ x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) }];
  dir = { x: 1, y: 0 };
  nextDir = { ...dir };
  score = 0;
  scoreEl.textContent = 0;
  placeFood();
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function update() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // wall or self collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    placeFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // grid
  ctx.strokeStyle = 'rgba(0,255,0,0.04)';
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++)
      ctx.strokeRect(x * CELL, y * CELL, CELL, CELL);

  // food
  ctx.fillStyle = '#f00';
  ctx.shadowColor = '#f00';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // snake
  snake.forEach((s, i) => {
    const brightness = Math.max(80, 255 - i * 6);
    ctx.fillStyle = i === 0 ? '#0f0' : `rgb(0,${brightness},0)`;
    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = i === 0 ? 10 : 0;
    ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
  });
  ctx.shadowBlur = 0;
}

function tick() {
  update();
  draw();
}

function start() {
  overlay.classList.remove('active');
  overlay.innerHTML = '';
  init();
  draw();
  running = true;
  timer = setInterval(tick, TICK_MS);
}

function gameOver() {
  running = false;
  clearInterval(timer);
  overlay.innerHTML = `
    <div class="msg">GAME OVER</div>
    <div class="sub">Score: ${score}</div>
    <button id="restartBtn">Play Again</button>`;
  overlay.classList.add('active');
  document.getElementById('restartBtn').addEventListener('click', start);
}

// controls
document.addEventListener('keydown', e => {
  if (!running && (e.key === 'Enter' || e.key === ' ')) { start(); return; }
  const map = {
    ArrowUp:    { x: 0, y:-1 }, w: { x: 0, y:-1 },
    ArrowDown:  { x: 0, y: 1 }, s: { x: 0, y: 1 },
    ArrowLeft:  { x:-1, y: 0 }, a: { x:-1, y: 0 },
    ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 },
  };
  const d = map[e.key];
  if (d && (d.x + dir.x !== 0 || d.y + dir.y !== 0)) {
    nextDir = d;
    e.preventDefault();
  }
});

startBtn.addEventListener('click', start);
init();
draw();
</script>
</body>
</html>
